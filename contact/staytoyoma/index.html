<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex"> <title>矢野竜太郎｜STAY TOYOMA 宿守</title>
  <link rel="icon" href="/images/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --paper: #f5f2ed;
      --accent: #6b4c3b;
      --muted: #8a8078;
      --line: #d8d2c9;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--line);
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .header-text { flex: 1; }

    .name-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.2;
      color: var(--ink);
    }

    .name-en {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      margin-top: 0.4rem;
      text-transform: uppercase;
    }

    .title {
      font-size: 0.82rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-top: 0.8rem;
    }

    .photo-thumb {
      width: 100px;
      height: 100px;
      flex-shrink: 0;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .links {
      display: flex;
      flex-direction: column;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: var(--ink);
      transition: color 0.2s;
    }

    .link-item:hover { color: var(--accent); }

    .link-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .link-item:hover .link-icon { color: var(--accent); }

    .link-body { flex: 1; }

    .link-text {
      font-size: 0.88rem;
      letter-spacing: 0.02em;
    }

    .link-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.1rem;
    }

    .map-thumb {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .map-thumb iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      pointer-events: none;
    }

    .cta {
      margin-top: 2rem;
      display: block;
      width: 100%;
      padding: 0.9rem;
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    .cta:hover { background: var(--accent); }
  </style>
</head>
